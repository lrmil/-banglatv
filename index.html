<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলা লাইভ টিভি ও স্পোর্টস</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js for .m3u8 live streaming support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-zinc-950 text-white font-sans">

    <!-- নেভিগেশন বার -->
    <nav class="bg-zinc-900 border-b border-zinc-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-red-500 flex items-center gap-2">
                <i class="fa-solid fa-tv"></i> বাংলাটিভি <span class="text-xs bg-red-600 text-white px-2 py-0.5 rounded-full">লাইভ</span>
            </a>
            <div id="navAuth" class="flex gap-4 items-center">
                <!-- জাভাস্ক্রিপ্ট দ্বারা ডাইনামিকালি চেঞ্জ হবে -->
                <a href="user.html" class="text-sm bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg transition">ড্যাশবোর্ড</a>
            </div>
        </div>
    </nav>

    <!-- মেইন কন্টেন্ট -->
    <main class="container mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- ভিডিও প্লেয়ার (বাম পাশে) -->
        <div class="lg:col-span-2">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                <div class="aspect-video bg-black relative">
                    <video id="videoPlayer" controls autoplay class="w-full h-full object-contain"></video>
                </div>
                <div class="p-4">
                    <h1 id="playingTitle" class="text-xl font-bold">চ্যানেল সিলেক্ট করুন</h1>
                    <p class="text-zinc-400 text-sm mt-1"><i class="fa-regular fa-eye mr-1"></i> লাইভ স্ট্রিমিং</p>
                </div>
            </div>
        </div>

        <!-- চ্যানেল লিস্ট ও ক্যাটাগরি ফিল্টার -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 h-[550px] flex flex-col">
            <h2 class="text-lg font-bold mb-3 flex items-center gap-2 border-b border-zinc-800 pb-2">
                <i class="fa-solid fa-list text-red-500"></i> লাইভ চ্যানেলসমূহ
            </h2>
            
            <!-- ক্যাটাগরি ফিল্টার বাটন -->
            <div class="flex gap-2 mb-3 overflow-x-auto pb-2">
                <button onclick="filterChannels('all')" class="bg-red-600 text-xs px-3 py-1.5 rounded-full font-semibold whitespace-nowrap">সব</button>
                <button onclick="filterChannels('sports')" class="bg-zinc-800 hover:bg-zinc-700 text-xs px-3 py-1.5 rounded-full font-semibold whitespace-nowrap">খেলাধুলা</button>
                <button onclick="filterChannels('tv show')" class="bg-zinc-800 hover:bg-zinc-700 text-xs px-3 py-1.5 rounded-full font-semibold whitespace-nowrap">টিভি শো</button>
                <button onclick="filterChannels('movies')" class="bg-zinc-800 hover:bg-zinc-700 text-xs px-3 py-1.5 rounded-full font-semibold whitespace-nowrap">মুভি</button>
            </div>

            <!-- চ্যানেল আইটেম লিস্ট -->
            <div id="channelListContainer" class="overflow-y-auto space-y-2 flex-1 pr-1">
                <!-- ডাইনামিকালি অ্যাডমিন ডাটা এখানে আসবে -->
            </div>
        </div>
    </main>

    <!-- প্যাকেজ সেকশন -->
    <section id="packages" class="container mx-auto px-4 py-12 border-t border-zinc-900">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-white">প্রিমিয়াম সাবস্ক্রিপশন প্যাকেজ</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
            <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold">বেসিক স্পোর্টস প্যাক</h3>
                    <div class="my-4"><span class="text-3xl font-extrabold text-orange-500">৳ ৫০</span> / ৩০ দিন</div>
                </div>
                <button onclick="buyPackage('বেসিক স্পোর্টস প্যাক', 50)" class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-xl font-semibold transition">কিনুন</button>
            </div>
        </div>
    </section>

    <!-- প্লেয়ার এবং চ্যানেল লোড করার জাভাস্ক্রিপ্ট লজিক -->
    <script>
        // ডিফল্ট কিছু ডেমো চ্যানেল (মক ডাটা)
        const defaultChannels = [
            { id: 1, name: "GTV Sports", category: "sports", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { id: 2, name: "Sample TV Show", category: "tv show", url: "https://playertest.longtailvideo.com/adaptive/bipbop/bipbop.m3u8" },
            { id: 3, name: "Action Movie Stream", category: "movies", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        // লোকাল স্টোরেজ থেকে চ্যানেল ডাটা পড়া
        let channels = JSON.parse(localStorage.getItem('channels')) || defaultChannels;
        if(!localStorage.getItem('channels')) localStorage.setItem('channels', JSON.stringify(defaultChannels));

        function loadChannels(category = 'all') {
            const container = document.getElementById('channelListContainer');
            container.innerHTML = '';
            
            const filtered = category === 'all' ? channels : channels.filter(c => c.category === category);
            
            if(filtered.length === 0) {
                container.innerHTML = '<p class="text-sm text-zinc-500 text-center py-4">কোনো চ্যানেল পাওয়া যায়নি</p>';
                return;
            }

            filtered.forEach(channel => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-3 bg-zinc-800/50 hover:bg-zinc-800 rounded-xl cursor-pointer border border-transparent hover:border-zinc-700 transition";
                div.onclick = () => playVideo(channel.url, channel.name);
                div.innerHTML = `
                    <div class="w-10 h-10 bg-zinc-700 rounded-lg flex items-center justify-center font-bold text-red-500 text-xs">TV</div>
                    <div class="flex-1">
                        <h4 class="font-semibold text-sm">${channel.name}</h4>
                        <span class="text-[10px] uppercase bg-zinc-900 text-zinc-400 px-2 py-0.5 rounded mt-1 inline-block">${channel.category}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function playVideo(url, name) {
            const video = document.getElementById('videoPlayer');
            document.getElementById('playingTitle').innerText = name;
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        function filterChannels(category) {
            loadChannels(category);
        }

        function buyPackage(name, price) {
            let loggedInUser = JSON.parse(localStorage.getItem('currentUser'));
            if(!loggedInUser) {
                alert('প্যাকেজ কিনতে প্রথমে লগইন বা সাইনআপ করুন!');
                window.location.href = 'user.html';
                return;
            }
            alert(`${name} সফলভাবে কেনা হয়েছে! আপনার ব্যালেন্স থেকে ৳${price} কাটা হয়েছে।`);
        }

        // ইনিশিয়াল লোড
        loadChannels();
        if(channels.length > 0) playVideo(channels[0].url, channels[0].name);

        // লগইন চেক ফর নেভবার
        let user = JSON.parse(localStorage.getItem('currentUser'));
        if(user) {
            document.getElementById('navAuth').innerHTML = `<span class="text-sm text-green-400">👤 ${user.name} (${user.role})</span> <a href="user.html" class="text-sm bg-zinc-800 px-3 py-1.5 rounded-lg">ড্যাশবোর্ড</a>`;
        } else {
            document.getElementById('navAuth').innerHTML = `<a href="user.html" class="text-sm bg-red-600 px-4 py-2 rounded-lg font-bold">লগইন / সাইনআপ</a>`;
        }
    </script>
</body>
</html>
