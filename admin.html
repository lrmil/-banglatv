<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাস্টার অ্যাডমিন প্যানেল</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white font-sans flex min-h-screen">

    <aside class="w-64 bg-zinc-900 border-r border-zinc-800 p-6 hidden md:block">
        <h2 class="text-xl font-black text-red-500 mb-6"><i class="fa-solid fa-unlock-keyhole"></i> ADMIN PANEL</h2>
        <nav class="space-y-2">
            <a href="#" class="block p-3 bg-red-600 rounded-xl text-sm font-semibold">কন্ট্রোল ড্যাশবোর্ড</a>
            <a href="index.html" class="block p-3 hover:bg-zinc-800 rounded-xl text-sm text-zinc-400">মূল ওয়েবসাইট</a>
            <button onclick="localStorage.removeItem('currentUser'); window.location.href='user.html'" class="w-full text-left p-3 text-red-400 text-sm">লগআউট</button>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">সেন্ট্রাল অ্যাডমিন কন্ট্রোল</h1>
                <p class="text-sm text-zinc-400">মাস্টার লগইন: <span class="text-white">admin@tv.com (pass: admin123)</span></p>
            </div>
        </header>

        <!-- ১. m3u8 ফাইল/লিঙ্ক যোগ করার এডভান্সড অপশন (ক্যাটাগরি ভিত্তিক) -->
        <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 mb-8">
            <h3 class="font-bold text-base text-red-500 mb-4"><i class="fa-solid fa-plus-circle mr-1"></i> নতুন লাইভ টিভি/M3U8 লিঙ্ক যোগ করুন (ক্যাটাগরি ভিত্তিক)</h3>
            <form onsubmit="addLiveChannel(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">চ্যানেলের নাম</label>
                    <input type="text" id="chanName" required placeholder="Sony Ten HD" class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs text-zinc-400 block mb-1">M3U8 স্ট্রিম লিঙ্ক (URL)</label>
                    <input type="url" id="chanUrl" required placeholder="https://example.com/live.m3u8" class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">ক্যাটাগরি সিলেক্ট করুন</label>
                    <select id="chanCategory" class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                        <option value="sports">Sports (খেলাধুলা)</option>
                        <option value="tv show">TV Show (টিভি শো)</option>
                        <option value="movies">Movies (মুভি)</option>
                    </select>
                </div>
                <div class="md:col-span-4 text-right">
                    <button class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-xl text-sm font-bold transition">চ্যানেল লাইভ করুন</button>
                </div>
            </form>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- ২. রিসেলার আইডি তৈরি ফরম -->
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <h3 class="font-bold text-orange-500 text-sm mb-4"><i class="fa-solid fa-user-tie mr-1"></i> নতুন রিসেলার আইডি তৈরি করুন</h3>
                <form onsubmit="adminCreateReseller(event)" class="space-y-3">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">রিসেলারের নাম</label>
                        <input type="text" id="resName" required class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">ইমেইল</label>
                        <input type="email" id="resEmail" required class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">পাসওয়ার্ড</label>
                        <input type="password" id="resPass" required class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                    </div>
                    <button class="w-full bg-orange-600 hover:bg-orange-700 py-2 rounded-xl font-bold text-sm">রিসেলার তৈরি নিশ্চিত করুন</button>
                </form>
            </div>

            <!-- ৩. অল ইউজার ও রিসেলার কন্ট্রোল লিস্ট টেবিল -->
            <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <h3 class="font-bold text-sm mb-4"><i class="fa-solid fa-users-gear mr-1"></i> সামগ্রিক ইউজার ও রিসেলার কন্ট্রোল</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-zinc-400">
                        <thead class="bg-zinc-800 text-zinc-200 text-xs">
                            <tr>
                                <th class="p-3">ইউজার নাম</th>
                                <th class="p-3">ইমেইল</th>
                                <th class="p-3">রোল (Role)</th>
                                <th class="p-3 text-right">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="adminUserTable" class="divide-y divide-zinc-800">
                            <!-- JS ডাটা লোড হবে -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // সিকিউরিটি চেক
        let currentAdmin = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentAdmin || currentAdmin.role !== 'admin') {
            window.location.href = 'user.html';
        }

        // এপিআই/লোকালস্টোরেজে চ্যানেল অ্যাড করার মেথড
        function addLiveChannel(e) {
            e.preventDefault();
            let channels = JSON.parse(localStorage.getItem('channels')) || [];
            
            const newChannel = {
                id: Date.now(),
                name: document.getElementById('chanName').value,
                url: document.getElementById('chanUrl').value,
                category: document.getElementById('chanCategory').value
            };

            channels.push(newChannel);
            localStorage.setItem('channels', JSON.stringify(channels));
            alert('নতুন চ্যানেল সফলভাবে যুক্ত হয়েছে এবং ইণ্ডেক্স পেজে লাইভ হয়েছে!');
            
            document.getElementById('chanName').value = '';
            document.getElementById('chanUrl').value = '';
        }

        // রিসেলার একাউন্ট তৈরি
        function adminCreateReseller(e) {
            e.preventDefault();
            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            
            let email = document.getElementById('resEmail').value;
            if(allUsers.some(u => u.email === email)) {
                alert('এই ইমেইল অ্যাকাউন্টটি অলরেডি আছে!');
                return;
            }

            let newReseller = {
                name: document.getElementById('resName').value,
                email: email,
                password: document.getElementById('resPass').value,
                role: 'reseller',
                createdBy: 'admin'
            };

            allUsers.push(newReseller);
            localStorage.setItem('allUsers', JSON.stringify(allUsers));
            alert('নতুন রিসেলার একাউন্ট তৈরি সম্পন্ন!');
            
            document.getElementById('resName').value = '';
            document.getElementById('resEmail').value = '';
            document.getElementById('resPass').value = '';
            loadAllUsers();
        }

        // ইউজার তালিকা লোড
        function loadAllUsers() {
            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            const table = document.getElementById('adminUserTable');
            table.innerHTML = '';

            allUsers.forEach((u, index) => {
                table.innerHTML += `
                    <tr>
                        <td class="p-3 text-white font-semibold">${u.name}</td>
                        <td class="p-3">${u.email}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded text-xs ${u.role === 'reseller' ? 'bg-orange-950 text-orange-400 font-bold' : 'bg-zinc-800 text-zinc-300'}">${u.role.toUpperCase()}</span></td>
                        <td class="p-3 text-right">
                            <button onclick="deleteUser(${index})" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white text-xs px-2 py-1 rounded transition"><i class="fa-solid fa-trash"></i> ডিলিট</button>
                        </td>
                    </tr>
                `;
            });
        }

        function deleteUser(index) {
            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            if(confirm('আপনি কি নিশ্চিতভাবে এই অ্যাকাউন্টটি মুছে ফেলতে চান?')) {
                allUsers.splice(index, 1);
                localStorage.setItem('allUsers', JSON.stringify(allUsers));
                loadAllUsers();
            }
        }

        loadAllUsers();
    </script>
</body>
</html>
