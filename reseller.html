<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রিসেলার ড্যাশবোর্ড</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white font-sans flex min-h-screen">

    <aside class="w-64 bg-zinc-900 border-r border-zinc-800 p-6 hidden md:block">
        <h2 class="text-xl font-bold text-orange-500 mb-6"><i class="fa-solid fa-briefcase"></i> রিসেলার প্যানেল</h2>
        <nav class="space-y-2">
            <a href="#" class="block p-3 bg-orange-600 rounded-xl text-sm font-semibold">ড্যাশবোর্ড</a>
            <a href="index.html" class="block p-3 hover:bg-zinc-800 rounded-xl text-sm text-zinc-400">মূল ওয়েবসাইট</a>
            <button onclick="localStorage.removeItem('currentUser'); window.location.href='user.html'" class="w-full text-left p-3 text-red-400 text-sm">লগআউট</button>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        <header class="mb-6">
            <h1 class="text-2xl font-bold">স্বাগতম রিসেলার, <span id="resellerName" class="text-orange-500">...</span></h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <p class="text-sm text-zinc-400">আমার কমিশন ব্যালেন্স</p>
                <h3 class="text-3xl font-black text-orange-500">৳ ৪৫০.০০</h3>
            </div>
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <p class="text-sm text-zinc-400">আমার তৈরি মোট কাস্টমার</p>
                <h3 id="customerCount" class="text-3xl font-black">০ জন</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- কাস্টমার তৈরি ফর্ম -->
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <h3 class="font-bold mb-4 text-sm text-orange-500"><i class="fa-solid fa-user-plus mr-1"></i> নতুন কাস্টমার আইডি তৈরি করুন</h3>
                <form onsubmit="resellerCreateUser(event)" class="space-y-3">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">কাস্টমারের নাম</label>
                        <input type="text" id="custName" required class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">ইমেইল</label>
                        <input type="email" id="custEmail" required class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">পাসওয়ার্ড</label>
                        <input type="password" id="custPass" required class="w-full bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl text-sm focus:outline-none">
                    </div>
                    <button class="w-full bg-orange-600 hover:bg-orange-700 py-2 rounded-xl font-bold text-sm">অটো একাউন্ট ক্রিয়েট</button>
                </form>
            </div>

            <!-- ইউজার তালিকা -->
            <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <h3 class="font-bold mb-4 text-sm"><i class="fa-solid fa-users mr-1"></i> আমার আন্ডারে থাকা গ্রাহক তালিকা</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-zinc-400">
                        <thead class="bg-zinc-800 text-zinc-200 text-xs">
                            <tr>
                                <th class="p-3">নাম</th>
                                <th class="p-3">ইমেইল</th>
                                <th class="p-3">রোল</th>
                            </tr>
                        </thead>
                        <tbody id="myCustomersTable" class="divide-y divide-zinc-800">
                            <!-- JS ডাটা -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentReseller = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentReseller || currentReseller.role !== 'reseller') {
            window.location.href = 'user.html';
        } else {
            document.getElementById('resellerName').innerText = currentReseller.name;
        }

        function loadMyCustomers() {
            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            let myCust = allUsers.filter(u => u.createdBy === currentReseller.email);
            
            document.getElementById('customerCount').innerText = `${myCust.length} জন`;
            const table = document.getElementById('myCustomersTable');
            table.innerHTML = '';

            myCust.forEach(c => {
                table.innerHTML += `
                    <tr>
                        <td class="p-3 text-white">${c.name}</td>
                        <td class="p-3">${c.email}</td>
                        <td class="p-3"><span class="bg-zinc-800 text-xs px-2 py-0.5 rounded text-zinc-400">${c.role}</span></td>
                    </tr>
                `;
            });
        }

        function resellerCreateUser(e) {
            e.preventDefault();
            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            
            let email = document.getElementById('custEmail').value;
            if(allUsers.some(u => u.email === email)) {
                alert('এই ইমেইলটি আগে থেকেই ব্যবহৃত হচ্ছে!');
                return;
            }

            let newUser = {
                name: document.getElementById('custName').value,
                email: email,
                password: document.getElementById('custPass').value,
                role: 'user',
                createdBy: currentReseller.email
            };

            allUsers.push(newUser);
            localStorage.setItem('allUsers', JSON.stringify(allUsers));
            alert('গ্রাহক একাউন্ট সফলভাবে তৈরি হয়েছে!');
            document.getElementById('custName').value = '';
            document.getElementById('custEmail').value = '';
            document.getElementById('custPass').value = '';
            loadMyCustomers();
        }

        loadMyCustomers();
    </script>
</body>
</html>
